<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', '宋体', 'SimSun', serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d5b7 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 69, 19, 0.03) 2px,
                    rgba(139, 69, 19, 0.03) 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, rgba(139, 69, 19, 0.1), transparent);
            border-bottom: 3px solid #8b4513;
            position: relative;
            margin-bottom: 40px;
        }

        header::before,
        header::after {
            content: '❖';
            position: absolute;
            bottom: -15px;
            font-size: 24px;
            color: #8b4513;
        }

        header::before {
            left: 30%;
        }

        header::after {
            right: 30%;
        }

        h1 {
            font-size: 48px;
            color: #5c3a21;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: 12px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 18px;
            color: #8b6914;
            letter-spacing: 6px;
            font-style: italic;
        }

        nav {
            background-color: rgba(139, 69, 19, 0.05);
            border: 2px solid #8b4513;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        nav li a {
            color: #5c3a21;
            text-decoration: none;
            font-size: 18px;
            letter-spacing: 3px;
            padding: 10px 20px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }

        nav li a::before {
            content: '◆';
            position: absolute;
            left: -5px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 8px;
            color: #8b4513;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        nav li a:hover {
            border: 1px solid #8b4513;
            background-color: rgba(139, 69, 19, 0.1);
            border-radius: 4px;
        }

        nav li a:hover::before {
            opacity: 1;
        }

        main {
            display: block;
            margin-bottom: 40px;
        }

        section {
            background-color: rgba(255, 253, 240, 0.8);
            border: 2px solid #d4a574;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        section:last-child {
            margin-bottom: 0;
        }


        section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, #8b4513, #d4a574, #8b4513);
        }

        h2 {
            color: #5c3a21;
            font-size: 28px;
            margin-bottom: 20px;
            letter-spacing: 4px;
            border-bottom: 2px solid #d4a574;
            padding-bottom: 10px;
            position: relative;
        }

        h2::after {
            content: '✦';
            position: absolute;
            right: 0;
            bottom: -12px;
            color: #8b4513;
            font-size: 16px;
        }

        p {
            color: #6b4423;
            line-height: 2;
            font-size: 16px;
            letter-spacing: 1px;
            text-indent: 2em;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(to top, rgba(139, 69, 19, 0.1), transparent);
            border-top: 2px solid #8b4513;
            color: #5c3a21;
            font-size: 14px;
            letter-spacing: 2px;
            position: relative;
        }

        footer::before {
            content: '─── ❈ ───';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            color: #8b4513;
            font-size: 18px;
            letter-spacing: 8px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
                letter-spacing: 8px;
            }

            main {
                grid-template-columns: 1fr;
            }

            nav ul {
                gap: 20px;
            }

            header::before,
            header::after {
                display: none;
            }
        }

        ::selection {
            background-color: #d4a574;
            color: #5c3a21;
        }

        ::-moz-selection {
            background-color: #d4a574;
            color: #5c3a21;
        }

        ::-moz-selection {
            background-color: #d4a574;
            color: #5c3a21;
        }

        /* 赛博朋克风格 section */
        .cyber-section {
            background-color: #0a0a0a;
            border: 1px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .cyber-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                    to bottom,
                    transparent 50%,
                    rgba(0, 255, 0, 0.03) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            animation: scanline 10s linear infinite;
        }

        @keyframes scanline {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(4px);
            }
        }

        .cyber-section h2 {
            color: #00cc00;
            font-size: 1.8rem;
            margin: 25px 0 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid #005500;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        .cyber-section p {
            color: #88ff88;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            text-indent: 0;
        }

        .cyber-section a {
            color: #00ffff;
            text-decoration: none;
            border-bottom: 1px dotted #00ffff;
            transition: all 0.3s;
        }

        .cyber-section a:hover {
            color: #ffffff;
            background-color: #005500;
            text-shadow: 0 0 5px #00ff00;
        }

        .cyber-section .code-block pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        @keyframes blink {
            0%, 50% {
                opacity: 1;
            }
            51%, 100% {
                opacity: 0;
            }
        }

        .cyber-section .code-block pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* 可点击的 cyber-section */
        .cyber-section.clickable {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cyber-section.clickable:hover {
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6), inset 0 0 20px rgba(0, 255, 0, 0.1);
            border-color: #00ff00;
            transform: translateY(-2px);
        }

        .cyber-section.clickable:active {
            transform: translateY(0);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
        }

        .cyber-section.clickable::after {
            content: '▶';
            position: absolute;
            bottom: 10px;
            right: 15px;
            color: #00ff00;
            font-size: 20px;
            opacity: 0.6;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.6;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        @keyframes blink {
            0%, 50% {
                opacity: 1;
            }
            51%, 100% {
                opacity: 0;
            }
        }

        ::-moz-selection {
            background-color: #d4a574;
            color: #5c3a21;
        }

        /* 古风可点击框 */
        .ancient-clickable {
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .ancient-clickable:hover {
            box-shadow: 0 8px 16px rgba(139, 69, 19, 0.3);
            transform: translateY(-3px);
            border-color: #8b4513;
            background-color: rgba(255, 253, 240, 0.95);
        }

        .ancient-clickable:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(139, 69, 19, 0.2);
        }

        .ancient-clickable::after {
            content: '❧';
            position: absolute;
            bottom: 15px;
            right: 20px;
            color: #8b4513;
            font-size: 24px;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .ancient-clickable:hover::after {
            opacity: 1;
            transform: translateX(5px);
        }

        /* 赛博朋克风格 section */
        .cyber-section {
            background-color: #0a0a0a;
            border: 1px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }


    </style>

</head>
<script>    document.addEventListener('DOMContentLoaded', function () {
    const navLinks = document.querySelectorAll('nav a');
    const sections = document.querySelectorAll('main section');

    navLinks.forEach(link => {
        link.addEventListener('click', function (e) {
            e.preventDefault();

            // 移除所有活动状态
            navLinks.forEach(l => l.style.color = '#5c3a21');
            sections.forEach(s => s.style.display = 'none');

            // 设置当前活动状态
            this.style.color = '#8b4513';
            const targetId = this.getAttribute('href').substring(1);
            const targetSection = document.getElementById(targetId);

            if (targetSection) {
                targetSection.style.display = 'block';
                targetSection.style.animation = 'fadeIn 0.5s ease-in-out';
            }
        });
    });

    // 默认显示第一个section
    sections.forEach((s, index) => {
        s.style.display = index === 0 ? 'block' : 'none';
    });
    navLinks[0].style.color = '#8b4513';
});
</script>
<body>
<div class="container">
    <header>
        <h1>FeSo4a</h1>
        <p class="subtitle">字肆，号龙眼居士，生卒年不详，现代不知名诗人</p>
    </header>

    <nav>
        <ul>
            <li><a href="#home">首页</a></li>
            <li><a href="#about">关于</a></li>
            <li><a href="#works">作品</a></li>
            <li><a href="#contact">联系</a></li>
        </ul>
    </nav>

    <main>
        <section id="home" class="tab-content">
            <h2>兴趣爱好</h2>
            <p>品茶论道，抚琴吟诗，对弈赏画，全栈开发（bushi）</p>
        </section>

        <section id="about" class="tab-content">
            <h2>作者简介</h2>
            <p>字肆，号龙眼居士，生卒年不详，现代不知名诗人，一名初三学生。</p>
        </section>

        <section id="works" class="tab-content">
            <h2>作品集</h2>

            <div class="ancient-clickable" onclick="location.href='/article/index.html'"
                 style="background-color: rgba(255, 253, 240, 0.8); border: 2px solid #d4a574; border-radius: 8px; padding: 30px; margin-top: 20px; margin-bottom: 30px;">
                <p>诗词作品集</p>
            </div>

            <div class="cyber-section clickable" onclick="location.href='/cli/index.html'"
                 style="margin-bottom: 30px;">
                <p>CLI 终端工具<span class="cursor"></span></p>
            </div>

        </section>

        <section id="contact" class="tab-content">
            <h2>联系方式</h2>
            <p>BiliBili: <a href="https://space.bilibili.com/3546674548967510">@FeSo4a</a></p>
            <p>GitHub: <a href="https://github.com/FeSo4a">@FeSo4a</a></p>
            <p>Modrinth: <a href="https://modrinth.com/user/FeSo4a">@FeSo4a</a></p>
        </section>
    </main>

    <footer>
        <p>© 二零二六年 · 古风雅韵</p>
    </footer>

</div>
</body>
</html>
